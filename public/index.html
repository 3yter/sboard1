<!DOCTYPE html>
<html>
<head>
    <title>CSMS Studentboard</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #messages { list-style-type: none; margin: 0; padding: 0; }
        #messages li { padding: 8px; margin-bottom: 4px; background: #f4f4f4; border-radius: 4px; }
        #form { display: flex; position: fixed; bottom: 0; left: 0; right: 0; padding: 10px; background: #ddd; }
        #input { flex-grow: 1; padding: 10px; }
    </style>
</head>
<body>
    <h1>📢 CSMS Studentboard</h1>
    <ul id="messages"></ul>
    <form id="form" action="">
        <input id="input" autocomplete="off" placeholder="Type message..." /><button>Send</button>
    </form>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();
        var form = document.getElementById('form');
        var input = document.getElementById('input');
        var messages = document.getElementById('messages');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (input.value) {
                socket.emit('chat message', input.value);
                input.value = '';
            }
        });

        socket.on('chat message', function(msg) {
            var item = document.createElement('li');
            item.textContent = msg;
            messages.appendChild(item);
            window.scrollTo(0, document.body.scrollHeight);
        });
    </script>
</body>
</html>
